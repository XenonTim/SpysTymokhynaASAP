<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ASAP — Реєстрація</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="auth-card">
    <h1>Реєстрація</h1>
    <p class="subtitle">Створіть акаунт, щоб почати спілкуватися.</p>

    <form id="register-form">
      <div class="field">
        <label for="login">Логін</label>
        <input id="login" type="text" autocomplete="username" required minlength="3">
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input id="password" type="password" autocomplete="new-password" required minlength="4">
      </div>
      <button class="btn btn-primary" type="submit" id="submit-btn">Зареєструватися</button>
    </form>

    <div class="message" id="message"></div>

    <div class="switch-row">
      Вже є акаунт? <a href="/login.html">Увійти</a>
    </div>
  </div>

  <script src="/asap-client.js"></script>
  <script>
    const form = document.getElementById("register-form");
    const submitBtn = document.getElementById("submit-btn");
    const messageBox = document.getElementById("message");
    let pendingLogin = null;
    let pendingPassword = null;

    function showMessage(text, kind) {
      messageBox.textContent = text;
      messageBox.className = "message show " + kind;
    }

    ASAPClient.onMessage((data) => {
      if (data.type === "REGISTER_SUCCESS") {
        showMessage("Акаунт створено! Виконую вхід...", "success");
        ASAPClient.send("LOGIN_REQUEST", { login: pendingLogin, password: pendingPassword });
      } else if (data.type === "REGISTER_FAIL") {
        submitBtn.disabled = false;
        showMessage(data.reason || "Не вдалося зареєструватися", "error");
      } else if (data.type === "LOGIN_SUCCESS") {
        sessionStorage.setItem("asap_login", data.login);
        sessionStorage.setItem("asap_role", data.role || "USER");
        window.location.href = "/chat.html";
      } else if (data.type === "LOGIN_FAIL" || data.type === "ERROR") {
        submitBtn.disabled = false;
        showMessage("Акаунт створено, але автоматичний вхід не вдався. Спробуйте увійти вручну.", "error");
      }
    });

    ASAPClient.onClose(() => {
      showMessage("З'єднання з сервером втрачено. Перезавантажте сторінку.", "error");
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;

      pendingLogin = document.getElementById("login").value.trim();
      pendingPassword = document.getElementById("password").value;

      try {
        await ASAPClient.connect();
        ASAPClient.send("REGISTER_REQUEST", { login: pendingLogin, password: pendingPassword });
      } catch (err) {
        submitBtn.disabled = false;
        showMessage("Не вдалося з'єднатися з сервером. Перевірте, чи запущено WebGateway.", "error");
      }
    });
  </script>
</body>
</html>
