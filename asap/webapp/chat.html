<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ASAP — Чат</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="me" id="me-name">—<span class="role-badge" id="role-badge" style="display:none;">ADMIN</span></div>
        <div class="status-line"><span class="status-dot" id="status-dot"></span><span id="status-text">З'єднання...</span></div>
      </div>

      <div class="new-chat-row">
        <input type="text" id="new-chat-login" placeholder="Логін користувача">
        <select id="new-chat-type">
          <option value="PRIVATE">Приватний</option>
          <option value="GROUP">Груповий</option>
        </select>
        <button id="new-chat-btn">+</button>
      </div>

      <ul class="chat-list" id="chat-list"></ul>

      <div class="admin-panel" id="admin-panel" style="display:none;">
        <h3>Адмін-панель</h3>
        <div class="admin-row">
          <input type="text" id="ban-login" placeholder="Логін для бану">
          <button id="ban-btn">Бан</button>
        </div>
        <button class="admin-stats-btn" id="stats-btn">Статистика серверу</button>
      </div>
    </aside>

    <main class="main-pane">
      <div class="main-header" id="main-header">
        <span class="placeholder-text">Оберіть чат зліва або створіть новий</span>
      </div>

      <div class="empty-state" id="empty-state">
        У вас ще немає відкритого чату. Введіть логін контакту вище, щоб почати спілкування.
      </div>

      <div class="messages-pane" id="messages-pane" style="display:none;"></div>

      <div class="composer" id="composer" style="display:none;">
        <input type="text" id="message-input" placeholder="Напишіть повідомлення..." autocomplete="off">
        <button id="send-btn">Надіслати</button>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/asap-client.js"></script>
  <script src="/crypto.js"></script>
  <script>
    const myLogin = sessionStorage.getItem("asap_login");
    const myRole = sessionStorage.getItem("asap_role") || "USER";
    let mySessionToken = sessionStorage.getItem("asap_session_token");

    if (!myLogin || !mySessionToken) {
      window.location.href = "/login.html";
    }

    ASAPClient.clearHandlers();

    document.getElementById("me-name").textContent = myLogin;
    if (myRole === "ADMIN") {
      document.getElementById("role-badge").style.display = "inline-block";
      document.getElementById("admin-panel").style.display = "block";
    }

    let chats = [];
    let activeChatId = null;
    let pendingChatIdToOpen = null;
    let messagesByChat = {};
    const onlineUsers = new Set();
    const chatPeers = {};
    const pendingDecrypt = {};

    async function ensureChatKey(chatId) {
      if (await ASAPCrypto.hasChatKey(chatId)) return true;

      const peers = chatPeers[chatId] || [];
      if (peers.length === 0) return false;

      const allMembers = [myLogin, ...peers].slice().sort();
      const iAmInitiator = allMembers[0] === myLogin;

      if (!iAmInitiator) {

        pendingDecrypt[chatId] = true;
        ASAPClient.send("REQUEST_KEY_EXCHANGE", { chatId });
        return false;
      }

      await ASAPCrypto.generateChatKey(chatId);
      for (const peerLogin of peers) {
        await sendKeyToPeer(chatId, peerLogin);
      }
      return true;
    }

    async function sendKeyToPeer(chatId, peerLogin) {
      const publicKey = await fetchPeerPublicKey(peerLogin);
      if (!publicKey) {
        console.warn("Немає публічного ключа для", peerLogin, "— ключ чату надішлю пізніше");
        return;
      }
      const encryptedKey = await ASAPCrypto.wrapChatKeyForPeer(chatId, publicKey);
      ASAPClient.send("KEY_EXCHANGE", { chatId, recipient: peerLogin, encryptedKey });
    }

    const publicKeyRequests = {};
    function fetchPeerPublicKey(login) {
      if (publicKeyRequests[login]) return publicKeyRequests[login];
      publicKeyRequests[login] = new Promise((resolve) => {
        publicKeyWaiters[login] = publicKeyWaiters[login] || [];
        publicKeyWaiters[login].push(resolve);
        ASAPClient.send("GET_PUBLIC_KEY", { login });
      });
      return publicKeyRequests[login];
    }
    const publicKeyWaiters = {};

    async function encryptForWire(chatId, text) {
      return ASAPCrypto.encryptMessage(chatId, text);
    }
    async function decryptFromWire(chatId, payload) {
      try {
        return await ASAPCrypto.decryptMessage(chatId, payload);
      } catch (e) {
        return "[не вдалося розшифрувати: немає ключа цього чату на цьому пристрої]";
      }
    }

    function showToast(text) {
      const toast = document.getElementById("toast");
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2500);
    }

    function setStatus(online) {
      document.getElementById("status-dot").classList.toggle("online", online);
      document.getElementById("status-text").textContent = online ? "Онлайн" : "Офлайн";
    }

    function renderChatList() {
      const list = document.getElementById("chat-list");
      list.innerHTML = "";

      chats.forEach((chat) => {

        if (chat.memberLogins) {
          const members = typeof chat.memberLogins === 'string' ? chat.memberLogins.split(";") : chat.memberLogins;
          chatPeers[chat.id] = members.map(m => m.trim()).filter(m => m && m.toLowerCase() !== myLogin.toLowerCase());
        }

        const li = document.createElement("li");
        li.className = "chat-list-item" + (chat.id === activeChatId ? " active" : "");

        let cleanName = chat.name ? chat.name : "Чат";
        let isOnline = false;

        if (chat.type === "GROUP") {
          if (chat.name && chat.name.startsWith("Group_")) {
            cleanName = "Група: " + chat.name.replace("Group_", "").replaceAll("_", ", ");
          } else {
            cleanName = "Група: " + cleanName;
          }
        } else {
          if (chat.memberLogins) {
            const members = typeof chat.memberLogins === 'string' ? chat.memberLogins.split(";") : chat.memberLogins;

            const partnerEmail = members.find(m => m.trim().toLowerCase() !== myLogin.toLowerCase());

            if (partnerEmail) {
              const cleanPartner = partnerEmail.trim();
              cleanName = cleanPartner.split("@")[0];

              isOnline = onlineUsers.has(cleanPartner);
            }
          }
        }

        let dotHtml = "";
        if (chat.type !== "GROUP") {
          const statusClass = isOnline ? "user-status-dot online" : "user-status-dot offline";
          dotHtml = `<span class="${statusClass}"></span>`;
        }

        li.innerHTML = `
          <div class="chat-item-title" style="display: flex; align-items: center; gap: 8px;">
            ${dotHtml}
            <span>${escapeHtml(cleanName)}</span>
          </div>
          <span class="chat-type">(${chat.type === "GROUP" ? "група" : "приватний"})</span>
        `;

        li.addEventListener("click", () => openChat(chat.id));
        list.appendChild(li);
      });
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    async function openChat(chatId) {
      activeChatId = chatId;
      renderChatList();

      const chat = chats.find((c) => c.id === chatId);
      let displayName = chat ? chat.name : "";

      if (chat) {
        if (chat.type === "GROUP") {
          displayName = chat.name.startsWith("Group_") ? "Група: " + chat.name.replace("Group_", "").replaceAll("_", ", ") : chat.name;
        } else {
          if (chat.memberLogins) {
            const members = typeof chat.memberLogins === 'string' ? chat.memberLogins.split(";") : chat.memberLogins;
            const partnerEmail = members.find(m => m.trim().toLowerCase() !== myLogin.toLowerCase());
            if (partnerEmail) displayName = partnerEmail.trim().split("@")[0];
          }
        }
      }

      document.getElementById("main-header").textContent = displayName;
      document.getElementById("empty-state").style.display = "none";
      document.getElementById("messages-pane").style.display = "flex";
      document.getElementById("composer").style.display = "flex";

      await ensureChatKey(chatId);

      if (!messagesByChat[chatId]) {
        ASAPClient.send("GET_HISTORY", { chatId });
      } else {
        renderMessages(chatId);
      }
    }

    function renderMessages(chatId) {
      const pane = document.getElementById("messages-pane");
      pane.innerHTML = "";
      (messagesByChat[chatId] || []).forEach((msg, index) => {
        const bubble = document.createElement("div");
        bubble.className = "msg-bubble " + (msg.sender === myLogin ? "mine" : "theirs");
        const time = msg.sentAt ? new Date(Number(msg.sentAt)).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : "";

        let actionsHtml = "";
        if (msg.sender === myLogin) {
          actionsHtml = `
            <div class="msg-actions" style="margin-top: 4px; text-align: right; opacity: 0.6; transition: opacity 0.2s;">
              <span title="Редагувати" style="cursor: pointer; margin-right: 10px; font-size: 13px;" onclick="editMessage('${chatId}', ${index})">✏️</span>
              <span title="Видалити" style="cursor: pointer; font-size: 13px;" onclick="deleteMessage('${chatId}', ${index}, '${msg.id || ''}')">🗑️</span>
            </div>
          `;
        }

        bubble.innerHTML = `
          <div class="meta">${escapeHtml(msg.sender)} · ${time}</div>
          <div class="msg-text-content" style="word-break: break-word;">${escapeHtml(msg.text)}</div>
          ${actionsHtml}
        `;

        bubble.addEventListener('mouseenter', () => {
          const acts = bubble.querySelector('.msg-actions');
          if (acts) acts.style.opacity = '1';
        });
        bubble.addEventListener('mouseleave', () => {
          const acts = bubble.querySelector('.msg-actions');
          if (acts) acts.style.opacity = '0.6';
        });

        pane.appendChild(bubble);
      });
      pane.scrollTop = pane.scrollHeight;
    }

    function addLiveMessage(chatId, sender, text, sentAt, messageId) {
      if (!messagesByChat[chatId]) messagesByChat[chatId] = [];
      messagesByChat[chatId].push({ id: messageId, sender, text, sentAt: sentAt || Date.now() });
      if (chatId === activeChatId) renderMessages(chatId);
    }

    function parseHistory(jsonArrayString) {
      try {
        return JSON.parse(jsonArrayString);
      } catch (e) {
        return [];
      }
    }

    ASAPClient.onOpen(async () => {
      setStatus(true);
      console.log("З'єднання встановлено. Ініціалізація сесії для:", myLogin);

      const publicKey = await ASAPCrypto.loadOrCreateIdentity(myLogin);
      ASAPClient.send("LOGIN_REQUEST", { login: myLogin, sessionToken: mySessionToken, publicKey });

      setInterval(() => {
        if (document.getElementById("status-dot").classList.contains("online")) {
          ASAPClient.send("PING", {});
        }
      }, 30000);
    });

    ASAPClient.onClose(() => {
      setStatus(false);
      showToast("З'єднання з сервером втрачено");
    });

    ASAPClient.onMessage((data) => {
      switch (data.type) {
        case "LOGIN_SUCCESS": {
          if (data.sessionToken) {
            mySessionToken = data.sessionToken;
            sessionStorage.setItem("asap_session_token", mySessionToken);
          }
          ASAPClient.send("GET_CONTACTS", {});
          break;
        }
        case "PONG": {
          break;
        }
        case "CONTACTS_RESPONSE": {
          try {
            chats = JSON.parse(data.chats || "[]");
            renderChatList();

            if (pendingChatIdToOpen) {
              openChat(pendingChatIdToOpen);
              pendingChatIdToOpen = null;
            }
          } catch (jsonError) {
            console.error("Помилка парсингу контактів:", jsonError);
          }
          break;
        }
        case "CHAT_CREATED": {

          if (data.memberLogins) {
            const members = data.memberLogins.split(";").map(m => m.trim());
            chatPeers[data.chatId] = members.filter(m => m && m.toLowerCase() !== myLogin.toLowerCase());
          }
          pendingChatIdToOpen = data.chatId;
          ASAPClient.send("GET_CONTACTS", {});
          break;
        }
        case "PUBLIC_KEY_RESPONSE": {
          (async () => {
            const waiters = publicKeyWaiters[data.login] || [];
            delete publicKeyWaiters[data.login];
            const key = await ASAPCrypto.importPeerPublicKey(data.login, data.publicKey);
            waiters.forEach((resolve) => resolve(key));
          })();
          break;
        }
        case "REQUEST_KEY_EXCHANGE": {

          (async () => {
            if ((await ASAPCrypto.hasChatKey(data.chatId)) && data.requester) {
              await sendKeyToPeer(data.chatId, data.requester);
            }
          })();
          break;
        }
        case "KEY_EXCHANGE": {

          (async () => {
            try {
              await ASAPCrypto.unwrapChatKey(data.chatId, data.encryptedKey);
              delete pendingDecrypt[data.chatId];
              if (data.chatId === activeChatId) {
                ASAPClient.send("GET_HISTORY", { chatId: activeChatId });
              }
            } catch (e) {
              console.error("Не вдалося розшифрувати AES-ключ чату:", e);
            }
          })();
          break;
        }
        case "HISTORY_RESPONSE": {
          (async () => {
            try {
              const raw = parseHistory(data.messages || "[]");
              await ensureChatKey(data.chatId);
              messagesByChat[data.chatId] = await Promise.all(raw.map(async (m) => {
                let textToShow;
                try {
                  textToShow = await decryptFromWire(data.chatId, m.content);
                } catch (e) {
                  textToShow = "[не вдалося розшифрувати]";
                }
                return {
                  id: m.id,
                  sender: m.sender,
                  text: textToShow,
                  sentAt: m.sentAt
                };
              }));

              if (data.chatId === activeChatId) {
                renderMessages(data.chatId);
              }
            } catch (err) {
              console.error("Помилка парсингу історії:", err);
            }
          })();
          break;
        }
        case "SEND_MSG": {
          (async () => {
            const text = await decryptFromWire(data.chatId, data.content);
            addLiveMessage(data.chatId, data.sender, text, Date.now(), data.messageId);
          })();
          break;
        }
        case "MSG_DELIVERED": {

          if (activeChatId && messagesByChat[activeChatId]) {
            const msgs = messagesByChat[activeChatId];
            for (let i = msgs.length - 1; i >= 0; i--) {
              if (msgs[i].sender === myLogin && !msgs[i].id) {
                msgs[i].id = data.messageId;
                break;
              }
            }
          }
          break;
        }
        case "USER_STATUS_UPDATE": {
          console.log("=== ОНОВЛЕННЯ СТАТУСУ ===", data);
          if (data.online === "true") {
            onlineUsers.add(data.login);
          } else {
            onlineUsers.delete(data.login);
          }
          console.log("Поточний Set онлайн-користувачів:", Array.from(onlineUsers));
          renderChatList();
          break;
        }
        case "ADMIN_ACTION_RESULT": {
          if (data.result === "stats") {
            showToast(`Активних з'єднань: ${data.connections}`);
          } else if (data.result === "REFRESH_HISTORY") {
            if (data.chatId === activeChatId) {
              ASAPClient.send("GET_HISTORY", {chatId: activeChatId});
            }
          }else {
            showToast(data.result);
          }
          break;
        }
        case "LOGIN_FAIL": {
          showToast(data.reason || "Сесію завершено");
          sessionStorage.clear();
          window.location.href = "/login.html";
          break;
        }
        case "ERROR": {
          showToast(data.reason || "Помилка");
          break;
        }
      }
    });

    document.getElementById("new-chat-btn").addEventListener("click", () => {
      const rawLogins = document.getElementById("new-chat-login").value.trim();
      const type = document.getElementById("new-chat-type").value;
      if (!rawLogins) return;

      const cleanedLogins = rawLogins.split(",")
              .map(l => l.trim())
              .filter(l => l.length > 0);

      if (cleanedLogins.length === 0) return;

      let membersList = [myLogin];
      cleanedLogins.forEach(login => {
        if (!membersList.includes(login)) {
          membersList.push(login);
        }
      });

      const getUsername = (email) => {
        if (!email || typeof email !== 'string') return "user";
        return email.split("@")[0];
      };

      let chatName = "";
      if (type === "GROUP") {
        chatName = `Group_${membersList.map(e => getUsername(e)).join("_")}`;
      } else {
        const targetUser = cleanedLogins[0];
        const pair = [myLogin, targetUser].sort().map(e => getUsername(e));
        chatName = `${pair}`;
      }

      ASAPClient.send("CREATE_CHAT", {
        chatType: type,
        name: chatName,
        members: membersList.join(",")
      });

      document.getElementById("new-chat-login").value = "";
    });

    document.getElementById("send-btn").addEventListener("click", sendCurrentMessage);
    document.getElementById("message-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendCurrentMessage();
    });

    async function sendCurrentMessage() {
      const input = document.getElementById("message-input");
      const text = input.value.trim();
      if (!text || !activeChatId) return;
      input.value = "";

      const keyReady = await ensureChatKey(activeChatId);
      if (!keyReady) {
        showToast("Очікую обмін ключем шифрування з учасником чату...");
        return;
      }

      const encrypted = await encryptForWire(activeChatId, text);
      ASAPClient.send("SEND_MSG", {
        chatId: activeChatId,
        content: encrypted
      });
      addLiveMessage(activeChatId, myLogin, text, Date.now());
    }

    document.getElementById("ban-btn").addEventListener("click", () => {
      const target = document.getElementById("ban-login").value.trim();
      if (!target) return;
      ASAPClient.send("ADMIN_ACTION", { action: "BAN_USER", target });
      document.getElementById("ban-login").value = "";
    });

    document.getElementById("stats-btn").addEventListener("click", () => {
      ASAPClient.send("ADMIN_ACTION", { action: "SERVER_STATS", target: "" });
    });

    ASAPClient.connect().catch(() => {
      showToast("Не вдалося з'єднатися з WebGateway");
    });

    window.editMessage = async function(chatId, msgIndex) {
      const msg = messagesByChat[chatId][msgIndex];
      const newText = prompt("Редагувати повідомлення:", msg.text);
      if (newText === null || newText.trim() === "") return;

      msg.text = newText.trim();
      renderMessages(chatId);

      if (msg.id) {
        const encrypted = await encryptForWire(chatId, newText.trim());
        ASAPClient.send("ADMIN_ACTION", {
          action: "EDIT_MESSAGE",
          messageId: msg.id,
          target: encrypted
        });
      }
    };

    window.deleteMessage = function(chatId, msgIndex, messageId) {
      if (!confirm("Ви впевнені, що хочете видалити це повідомлення?")) return;

      messagesByChat[chatId].splice(msgIndex, 1);
      renderMessages(chatId);

      if (messageId) {
        ASAPClient.send("ADMIN_ACTION", {
          action: "DELETE_MESSAGE",
          messageId: messageId
        });
      }
    };
  </script>
</body>
</html>
