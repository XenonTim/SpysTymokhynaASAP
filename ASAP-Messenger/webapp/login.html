<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ASAP — Вхід</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="auth-card">
    <h1>ASAP</h1>
    <p class="subtitle">Real-time месенджер. Увійдіть у свій акаунт.</p>

    <form id="login-form">
      <div class="field">
        <label for="login">Логін</label>
        <input id="login" type="text" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input id="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn btn-primary" type="submit" id="submit-btn">Увійти</button>
    </form>

    <div class="message" id="message"></div>

    <div class="switch-row">
      Немає акаунту? <a href="/register.html">Зареєструватися</a>
    </div>
  </div>

  <script src="/asap-client.js"></script>
  <script>
    const form = document.getElementById("login-form");
    const submitBtn = document.getElementById("submit-btn");
    const messageBox = document.getElementById("message");

    function showMessage(text, kind) {
      messageBox.textContent = text;
      messageBox.className = "message show " + kind;
    }

    ASAPClient.onMessage((data) => {
      if (data.type === "LOGIN_SUCCESS") {
        sessionStorage.setItem("asap_login", data.login);
        sessionStorage.setItem("asap_role", data.role || "USER");
        window.location.href = "/chat.html";
      } else if (data.type === "LOGIN_FAIL") {
        submitBtn.disabled = false;
        showMessage(data.reason || "Не вдалося увійти", "error");
      } else if (data.type === "ERROR") {
        submitBtn.disabled = false;
        showMessage(data.reason || "Сталася помилка", "error");
      }
    });

    ASAPClient.onClose(() => {
      showMessage("З'єднання з сервером втрачено. Перезавантажте сторінку.", "error");
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;

      const login = document.getElementById("login").value.trim();
      const password = document.getElementById("password").value;

      try {
        await ASAPClient.connect();
        ASAPClient.send("LOGIN_REQUEST", { login, password });
      } catch (err) {
        submitBtn.disabled = false;
        showMessage("Не вдалося з'єднатися з сервером. Перевірте, чи запущено WebGateway.", "error");
      }
    });
  </script>
</body>
</html>
